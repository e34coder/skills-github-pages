<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock and Prayer Times</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="day-time-box" id="status-border">
    <div class="day-container">
      <div class="day-name" id="day-name"></div>
      <div class="day-icon-container">
        <canvas id="dayIcon" class="day-icon" width="100" height="100"></canvas>
      </div>
      <div class="day-part" id="day-part"></div>
    </div>
    
    <div class="time-container">
      <div class="time" id="clock"></div>
      <div class="ampm" id="ampm"></div>
    </div>
    
    <div class="date-container">
      <div class="date-month" id="date-month"></div>
      <div class="date-day" id="date-day"></div>
      <div class="date-year" id="date-year"></div>
    </div>
  </div>

  <div class="prayer-info">
    <div class="prayer-row">
      <div class="current-prayer-box">
        <span id="current-prayer-name" class="prayer-name"></span>
        <span id="current-prayer-time" class="prayer-time"></span>
      </div>
      
      <div class="prayer-arrow">→</div>
      
      <div class="next-prayer-box">
        <span id="next-prayer-name" class="prayer-name"></span>
        <span id="next-prayer-time" class="prayer-time"></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
